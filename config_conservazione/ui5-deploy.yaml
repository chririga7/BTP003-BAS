specVersion: "3.0"
metadata:
  name: zdocconfigv1
type: application
builder:
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://c5addbf6-3a6f-464c-afb9-bde97029ca8b.abap.eu10.hana.ondemand.com
          destination: ABAP_Employee_RAP
        app:
          name: ZDOC_CONFIG
          package: ZEDOC_CONFIG
          transport: ""
        credentials:
          username: env:SAP_USERNAME
          password: env:SAP_PASSWORD
